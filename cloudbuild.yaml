steps:
  # 1. Compila l'immagine Docker
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/meteo_roma:$COMMIT_SHA', '.']

  # 2. Spinge l'immagine su Artifact Registry / Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/meteo_roma:$COMMIT_SHA']

  # 3. Aggiorna Cloud Run con la nuova immagine
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'sandro-ai'
      - '--image'
      - 'gcr.io/$PROJECT_ID/meteo_roma:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--port'
      - '80'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY