<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roma · Punti di interesse</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .info-box {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-width: 320px;
            backdrop-filter: blur(5px);
        }
        h1 { margin: 0 0 5px 0; font-size: 19px; color: #1e293b; display: flex; align-items: center; gap: 8px; }
        p { margin: 0 0 10px 0; font-size: 13px; color: #64748b; line-height: 1.4; }

        /* Riquadro meteo di Roma (in alto a destra) */
        .weather-box {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 14px 16px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); backdrop-filter: blur(5px); min-width: 190px;
        }
        .weather-head { display: flex; align-items: center; gap: 10px; }
        .weather-icon { font-size: 36px; line-height: 1; }
        .weather-temp { font-size: 24px; font-weight: bold; color: #1e293b; }
        .weather-cond { font-size: 12px; color: #64748b; }
        .weather-grid { display: flex; gap: 14px; margin-top: 10px; font-size: 11px; color: #64748b; text-align: center; }
        .weather-grid b { display: block; font-size: 13px; color: #1e293b; margin-top: 2px; }
        .weather-time { margin-top: 8px; font-size: 10px; color: #94a3b8; }

        .error-banner {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1001; background: #e74c3c; color: #fff;
            padding: 12px 20px; border-radius: 10px; font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: none;
            align-items: center; gap: 12px; max-width: 90vw;
        }
        .error-banner button {
            background: rgba(255,255,255,0.25); border: none; color: #fff;
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        .error-banner button:hover { background: rgba(255,255,255,0.4); }
        .legend-note { margin: 6px 0 0 0; font-size: 11px; color: #94a3b8; font-style: italic; line-height: 1.3; }
        .layer-select {
            width: 100%; margin: 4px 0 10px 0; padding: 6px 8px;
            border-radius: 6px; border: 1px solid #cbd5e1; font-size: 13px;
            background: #fff; color: #1e293b; cursor: pointer;
        }
        .control-label { display: block; font-size: 12px; font-weight: bold; color: #475569; margin-bottom: 2px; }
        .collapse-btn {
            margin-left: auto; background: none; border: none; cursor: pointer;
            font-size: 16px; line-height: 1; color: #64748b; padding: 0 4px;
        }
        .info-box.collapsed .collapsible { display: none; }
        .poi-emoji { background: none; border: none; text-align: center; }
        .raggio-slider { width: 100%; margin: 2px 0 4px 0; cursor: pointer; accent-color: #3b82f6; }
        @media (max-width: 480px) {
            .info-box { top: 10px; left: 10px; max-width: 50vw; padding: 8px 10px; }
            h1 { font-size: 13px; gap: 4px; }
            .info-box p, .control-label, .layer-select, .legend-note { font-size: 11px; }
            .weather-box { top: 10px; right: 10px; padding: 8px 10px; min-width: 0; max-width: 44vw; }
            .weather-head { gap: 6px; }
            .weather-icon { font-size: 24px; }
            .weather-temp { font-size: 18px; }
            .weather-cond { font-size: 10px; }
            .weather-grid { gap: 8px; font-size: 9px; margin-top: 8px; }
            .weather-grid b { font-size: 11px; }
            .weather-time { font-size: 9px; }
        }
    </style>
</head>
<body>

    <div class="info-box" id="info-box">
        <h1>Roma · Punti di interesse 📍 <button id="collapse-btn" class="collapse-btn" aria-label="Comprimi o espandi il pannello" aria-expanded="true">▾</button></h1>
        <div class="collapsible">
            <p>Scopri i punti di interesse vicino a te a Roma. Scegli cosa mostrare e regola il raggio di ricerca.</p>
            <label class="control-label" for="layer-select">Mostra</label>
            <select id="layer-select" class="layer-select"></select>
            <label class="control-label" for="raggio-slider">Raggio ricerca: <span id="raggio-val">2.0</span> km</label>
            <input type="range" id="raggio-slider" class="raggio-slider" min="0.5" max="5" step="0.5" value="2">
            <p id="legend-title" class="legend-note">Scegli un punto di interesse dal menu.</p>
        </div>
    </div>

    <div class="weather-box" id="weather-box">
        <div class="weather-head">
            <span class="weather-icon" id="weather-icon">⛅</span>
            <div>
                <div class="weather-temp" id="weather-temp">--°C</div>
                <div class="weather-cond" id="weather-cond">Roma</div>
            </div>
        </div>
        <div class="weather-grid">
            <div>🌡️ Percepiti<b id="weather-feels">--°</b></div>
            <div>💧 Umidità<b id="weather-hum">--%</b></div>
            <div>💨 Vento<b id="weather-wind">-- km/h</b></div>
        </div>
        <div class="weather-time" id="weather-time">Caricamento meteo…</div>
    </div>

    <div id="error-banner" class="error-banner">
        <span id="error-text">⚠️ Dati non disponibili.</span>
        <button id="retry-btn">Riprova</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script>
        // Mappa centrata su Roma
        const map = L.map('map').setView([41.8902, 12.4922], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Layer dei punti di interesse (nasoni / parchi) con clustering per le performance
        // (fallback a un layerGroup semplice se il plugin non è disponibile).
        const poiLayer = (typeof L.markerClusterGroup === "function")
            ? L.markerClusterGroup({ chunkedLoading: true, maxClusterRadius: 60 })
            : L.layerGroup();
        poiLayer.addTo(map);

        // Intervallo di auto-refresh del meteo (10 minuti)
        const INTERVALLO_REFRESH_MS = 10 * 60 * 1000;

        // Gestione del banner di errore visibile all'utente
        const errorBanner = document.getElementById("error-banner");
        const errorText = document.getElementById("error-text");
        function mostraErrore(messaggio) {
            errorText.textContent = `⚠️ ${messaggio}`;
            errorBanner.style.display = "flex";
        }
        function nascondiErrore() {
            errorBanner.style.display = "none";
        }

        // ===================== METEO GENERALE DI ROMA =====================
        const COORD_ROMA = [41.8902, 12.4922];

        // Codice meteo WMO (Open-Meteo) -> emoji + descrizione in italiano.
        function descriviMeteo(code, isDay) {
            if (code === 0) return { emoji: isDay ? "☀️" : "🌙", testo: "Sereno" };
            if (code === 1 || code === 2) return { emoji: isDay ? "🌤️" : "☁️", testo: "Poco nuvoloso" };
            if (code === 3) return { emoji: "☁️", testo: "Coperto" };
            if (code === 45 || code === 48) return { emoji: "🌫️", testo: "Nebbia" };
            if (code >= 51 && code <= 57) return { emoji: "🌦️", testo: "Pioviggine" };
            if (code >= 61 && code <= 67) return { emoji: "🌧️", testo: "Pioggia" };
            if (code >= 71 && code <= 77) return { emoji: "🌨️", testo: "Neve" };
            if (code >= 80 && code <= 82) return { emoji: "🌧️", testo: "Rovesci" };
            if (code >= 85 && code <= 86) return { emoji: "🌨️", testo: "Rovesci di neve" };
            if (code >= 95) return { emoji: "⛈️", testo: "Temporale" };
            return { emoji: "⛅", testo: "Variabile" };
        }

        async function caricaMeteoRoma() {
            const [lat, lon] = COORD_ROMA;
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code,is_day`;
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const c = (await res.json()).current;
                const meteo = descriviMeteo(c.weather_code, c.is_day);

                document.getElementById("weather-icon").textContent = meteo.emoji;
                document.getElementById("weather-temp").textContent = `${Math.round(c.temperature_2m)}°C`;
                document.getElementById("weather-cond").textContent = `Roma · ${meteo.testo}`;
                document.getElementById("weather-feels").textContent = `${Math.round(c.apparent_temperature)}°`;
                document.getElementById("weather-hum").textContent = `${c.relative_humidity_2m}%`;
                document.getElementById("weather-wind").textContent = `${Math.round(c.wind_speed_10m)} km/h`;

                const ora = new Date().toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" });
                document.getElementById("weather-time").textContent = `Aggiornato: ${ora}`;
                nascondiErrore();
            } catch (e) {
                console.error("Errore meteo Roma:", e);
                mostraErrore("Meteo di Roma non disponibile. Riprova tra poco.");
            }
        }

        // ===================== PUNTI DI INTERESSE (OpenStreetMap / Overpass) =====================
        let RAGGIO_POI_M = 2000;     // Raggio di ricerca (regolabile via slider), in metri
        let posizioneUtente = null;  // [lat, lon] del GPS reale (memorizzato una volta ottenuto)
        let centroRicerca = null;    // Centro effettivo usato per le query (GPS o fallback)
        let poiAttivo = null;        // "nasoni" | "parchi" attualmente mostrato (per ricaricare)
        // Layer per il marker "sei qui" e il cerchio del raggio di ricerca.
        const posizioneLayer = L.layerGroup().addTo(map);
        // Più mirror Overpass: se uno è occupato/lento, proviamo il successivo.
        const OVERPASS_ENDPOINTS = [
            "https://overpass-api.de/api/interpreter",
            "https://overpass.kumi.systems/api/interpreter",
            "https://overpass.private.coffee/api/interpreter"
        ];

        // Marker con sola emoji (senza l'icona blu di default di Leaflet)
        function iconaEmoji(emoji) {
            return L.divIcon({
                html: `<div style="font-size: 20px; line-height: 20px;">${emoji}</div>`,
                className: "poi-emoji", iconSize: [22, 22], iconAnchor: [11, 11]
            });
        }

        // Interroga Overpass provando più mirror finché uno risponde con JSON valido.
        async function interrogaOverpass(query) {
            let ultimoErrore = null;
            for (const endpoint of OVERPASS_ENDPOINTS) {
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), 25000);
                try {
                    const res = await fetch(endpoint, {
                        method: "POST",
                        body: "data=" + encodeURIComponent(query),
                        signal: controller.signal
                    });
                    clearTimeout(timer);
                    const testo = await res.text();
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    // Quando è occupato, Overpass risponde a volte HTTP 200 con HTML:
                    // proviamo a interpretare il JSON e, se fallisce, passiamo al mirror dopo.
                    let json;
                    try { json = JSON.parse(testo); }
                    catch { throw new Error("risposta non-JSON (server occupato)"); }
                    return json.elements || [];
                } catch (e) {
                    clearTimeout(timer);
                    ultimoErrore = e;
                    console.warn(`Overpass non disponibile (${endpoint}): ${e.message}`);
                    // si prosegue con il mirror successivo
                }
            }
            throw ultimoErrore || new Error("Tutti i mirror Overpass non disponibili");
        }

        // Area approssimata di un anello di coordinate (proiezione equirettangolare), in m².
        function areaPoligono(coords) {
            if (!coords || coords.length < 3) return 0;
            const latRad = coords[0].lat * Math.PI / 180;
            const mLat = 110540, mLon = 111320 * Math.cos(latRad);
            let somma = 0;
            for (let i = 0; i < coords.length; i++) {
                const a = coords[i], b = coords[(i + 1) % coords.length];
                somma += (a.lon * mLon) * (b.lat * mLat) - (b.lon * mLon) * (a.lat * mLat);
            }
            return Math.abs(somma) / 2;
        }

        function centroide(coords) {
            let la = 0, lo = 0;
            coords.forEach(c => { la += c.lat; lo += c.lon; });
            return [la / coords.length, lo / coords.length];
        }

        // Chiede la posizione GPS al browser (Promise; null se negata o non disponibile).
        function ottieniPosizione() {
            return new Promise(resolve => {
                if (!navigator.geolocation) { resolve(null); return; }
                navigator.geolocation.getCurrentPosition(
                    pos => resolve([pos.coords.latitude, pos.coords.longitude]),
                    err => { console.warn("Geolocalizzazione non disponibile:", err.message); resolve(null); },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
                );
            });
        }

        // Disegna il marker centrale e il cerchio del raggio, adattando lo zoom al raggio.
        function disegnaPosizioneUtente(test) {
            posizioneLayer.clearLayers();
            L.marker(centroRicerca, { icon: iconaEmoji(test ? "🧪" : "📍") })
                .bindPopup(test
                    ? "🧪 <b>Posizione di test</b><br><small>centro di Roma (GPS non disponibile)</small>"
                    : "📍 <b>Sei qui</b>")
                .addTo(posizioneLayer);
            const cerchio = L.circle(centroRicerca, {
                radius: RAGGIO_POI_M, color: "#2563eb", weight: 1,
                fillColor: "#3b82f6", fillOpacity: 0.06
            }).addTo(posizioneLayer);
            map.fitBounds(cerchio.getBounds(), { padding: [20, 20] });
        }

        // Prepara la posizione (GPS reale o fallback) e carica i POI del tipo richiesto.
        async function mostraPoi(tipo) {
            poiAttivo = tipo;
            poiLayer.clearLayers();

            if (!posizioneUtente) {
                document.getElementById("legend-title").textContent = "Individuo la tua posizione…";
                posizioneUtente = await ottieniPosizione(); // memorizziamo solo il GPS reale
            }

            let test = false;
            if (posizioneUtente) {
                centroRicerca = posizioneUtente;
            } else {
                // GPS non disponibile (es. test locale in http): usiamo il centro di Roma.
                // Su Cloud Run (HTTPS) il GPS reale funziona e questo ramo non scatta.
                centroRicerca = COORD_ROMA;
                test = true;
            }

            disegnaPosizioneUtente(test);
            if (tipo === "nasoni") await caricaNasoni();
            else if (tipo === "parchi") await caricaParchi();
        }

        // Carica i nasoni (fontanelle di acqua potabile) e li segna con ⛲.
        async function caricaNasoni() {
            document.getElementById("legend-title").textContent = "Carico le fontanelle vicine…";
            try {
                const [lat, lon] = centroRicerca;
                const q = `[out:json][timeout:25];node["amenity"="drinking_water"](around:${RAGGIO_POI_M},${lat},${lon});out skel;`;
                const nodi = await interrogaOverpass(q);
                const marker = nodi.map(n =>
                    L.marker([n.lat, n.lon], { icon: iconaEmoji("⛲") })
                        .bindPopup("⛲ <b>Nasone</b><br><small>Acqua potabile gratuita</small>")
                );
                poiLayer.addLayers ? poiLayer.addLayers(marker) : marker.forEach(m => m.addTo(poiLayer));
                nascondiErrore();
                document.getElementById("legend-title").textContent = `⛲ ${nodi.length} nasoni entro ${(RAGGIO_POI_M / 1000).toFixed(1)} km`;
            } catch (e) {
                console.error("Errore caricamento nasoni:", e);
                mostraErrore("Impossibile caricare le fontanelle (servizio OpenStreetMap occupato). Riprova tra poco.");
            }
        }

        // Carica i parchi più grandi di 3000 m² e li segna con 🌳.
        async function caricaParchi() {
            document.getElementById("legend-title").textContent = "Carico i parchi vicini…";
            try {
                const [lat, lon] = centroRicerca;
                const q = `[out:json][timeout:25];(way["leisure"="park"](around:${RAGGIO_POI_M},${lat},${lon});relation["leisure"="park"](around:${RAGGIO_POI_M},${lat},${lon}););out geom;`;
                const elementi = await interrogaOverpass(q);
                const marker = [];
                elementi.forEach(el => {
                    let area, centro;
                    if (el.geometry && el.geometry.length >= 3) {
                        // Way: anello esplicito di coordinate
                        area = areaPoligono(el.geometry);
                        centro = centroide(el.geometry);
                    } else if (el.bounds) {
                        // Relation: usiamo il riquadro come stima dell'area
                        const b = el.bounds;
                        const latRad = (b.minlat + b.maxlat) / 2 * Math.PI / 180;
                        area = (b.maxlat - b.minlat) * 110540 * (b.maxlon - b.minlon) * 111320 * Math.cos(latRad);
                        centro = [(b.minlat + b.maxlat) / 2, (b.minlon + b.maxlon) / 2];
                    } else {
                        return;
                    }
                    if (area < 3000) return; // Scartiamo i parchi troppo piccoli
                    const nome = (el.tags && el.tags.name) ? el.tags.name : "Parco";
                    marker.push(
                        L.marker(centro, { icon: iconaEmoji("🌳") })
                            .bindPopup(`🌳 <b>${nome}</b><br><small>~${Math.round(area).toLocaleString("it-IT")} m²</small>`)
                    );
                });
                poiLayer.addLayers ? poiLayer.addLayers(marker) : marker.forEach(m => m.addTo(poiLayer));
                nascondiErrore();
                document.getElementById("legend-title").textContent = `🌳 ${marker.length} parchi (oltre 3000 m²) entro ${(RAGGIO_POI_M / 1000).toFixed(1)} km`;
            } catch (e) {
                console.error("Errore caricamento parchi:", e);
                mostraErrore("Impossibile caricare i parchi (servizio OpenStreetMap occupato). Riprova tra poco.");
            }
        }

        // Punti di interesse selezionabili dal menu
        const POI = {
            nasoni: { label: "⛲ Nasoni (fontanelle)" },
            parchi: { label: "🌳 Parchi (oltre 3000 m²)" }
        };

        // ===================== UI: pannello, menu, slider =====================
        // Pannello informativo collassabile (utile soprattutto su mobile)
        const infoBox = document.getElementById("info-box");
        const collapseBtn = document.getElementById("collapse-btn");
        function impostaCollasso(collassato) {
            infoBox.classList.toggle("collapsed", collassato);
            collapseBtn.textContent = collassato ? "▸" : "▾";
            collapseBtn.setAttribute("aria-expanded", String(!collassato));
        }
        collapseBtn.addEventListener("click", () => {
            impostaCollasso(!infoBox.classList.contains("collapsed"));
        });
        if (window.matchMedia("(max-width: 480px)").matches) impostaCollasso(true);

        // Popoliamo il menu: opzione placeholder + i punti di interesse
        const layerSelect = document.getElementById("layer-select");
        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "Scegli cosa mostrare…";
        placeholder.selected = true;
        layerSelect.appendChild(placeholder);
        for (const [chiave, def] of Object.entries(POI)) {
            const opt = document.createElement("option");
            opt.value = chiave;
            opt.textContent = def.label;
            layerSelect.appendChild(opt);
        }

        layerSelect.addEventListener("change", (e) => {
            const val = e.target.value;
            if (val in POI) mostraPoi(val); // chiede il GPS e mostra i POI entro il raggio
        });

        // Slider del raggio: aggiorna l'etichetta live, ricarica i POI al rilascio
        const raggioSlider = document.getElementById("raggio-slider");
        const raggioVal = document.getElementById("raggio-val");
        raggioSlider.addEventListener("input", () => {
            RAGGIO_POI_M = parseFloat(raggioSlider.value) * 1000;
            raggioVal.textContent = parseFloat(raggioSlider.value).toFixed(1);
        });
        raggioSlider.addEventListener("change", () => {
            if (poiAttivo) mostraPoi(poiAttivo); // ricarica con il nuovo raggio
        });

        // Il pulsante "Riprova" ricarica il meteo e, se attivo, il layer di POI
        document.getElementById("retry-btn").addEventListener("click", () => {
            caricaMeteoRoma();
            if (poiAttivo) mostraPoi(poiAttivo);
        });

        // Avvio: meteo di Roma + auto-refresh periodico
        caricaMeteoRoma();
        setInterval(caricaMeteoRoma, INTERVALLO_REFRESH_MS);
    </script>
</body>
</html>
